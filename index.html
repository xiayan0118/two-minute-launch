<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Launch</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#070810">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Launch">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  html{
    min-height:calc(100% + env(safe-area-inset-top));
    background-color:#070810;
    background-image:radial-gradient(ellipse at bottom,#1b2735 0%,#070810 100%);
    background-attachment:fixed;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:transparent;
    color:#e8eef7;height:100%;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    -webkit-user-select:none;user-select:none;
  }
  #app{width:100%;max-width:460px;padding:24px;text-align:center;position:relative;z-index:5;}
  .stars{position:fixed;inset:0;z-index:1;pointer-events:none;}
  .star{position:absolute;background:#fff;border-radius:50%;}
  h1{font-size:15px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#8aa0bd;margin-bottom:22px;}
  input{
    width:100%;padding:14px 16px;font-size:16px;border-radius:12px;
    background:#10141c;color:#e8eef7;outline:none;border:1px solid #243049;margin-bottom:18px;
  }
  input::placeholder{color:#5a6b85;}
  button{
    width:100%;padding:16px;font-size:17px;font-weight:700;letter-spacing:.05em;
    border:none;border-radius:12px;cursor:pointer;
    background:linear-gradient(180deg,#ffb347,#ff8c1a);color:#1a1205;transition:transform .08s ease;
  }
  button:active{transform:scale(.97);}
  .hint{font-size:14px;color:#5a6b85;margin-top:20px;line-height:1.55;}

  /* scene */
  #scene{position:fixed;inset:0;z-index:3;display:none;}
  #cv{position:fixed;inset:0;z-index:2;}
  #countOverlay{position:absolute;top:14%;width:100%;text-align:center;font-size:120px;font-weight:800;color:#ffb347;text-shadow:0 0 30px rgba(255,140,40,.5);z-index:6;}
  #goText{position:absolute;top:16%;width:100%;text-align:center;font-size:84px;font-weight:800;letter-spacing:.12em;color:#7CFC8A;text-shadow:0 0 36px rgba(124,252,138,.6);z-index:6;display:none;}
  #flash{position:absolute;left:50%;bottom:18%;width:340px;height:340px;margin-left:-170px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,200,120,.9) 0%,rgba(255,140,40,.35) 35%,rgba(255,90,30,0) 70%);
    opacity:0;z-index:2;transition:opacity .15s ease;}
  #pad{position:absolute;left:50%;bottom:21%;width:120px;height:10px;margin-left:-60px;border-radius:4px;
    background:linear-gradient(180deg,#2a3550,#161d2e);box-shadow:0 6px 18px rgba(0,0,0,.6);z-index:3;}

  #rocketWrap{position:absolute;left:50%;bottom:22%;margin-left:-32px;width:64px;z-index:4;will-change:transform;}
  #rocket{display:flex;flex-direction:column;align-items:center;transform-origin:50% 100%;}
  #rocket.shake{animation:shake .06s infinite;}
  @keyframes shake{0%{transform:translate(-1px,0)}50%{transform:translate(1.5px,0)}100%{transform:translate(-1px,1px)}}

  .flame{width:22px;height:30px;margin-top:-3px;
    background:radial-gradient(circle at 50% 25%,#fff 0%,#ffe08a 22%,#ff9a3c 52%,#ff5a2c 78%,rgba(255,80,30,0) 100%);
    clip-path:polygon(50% 100%,14% 52%,32% 30%,50% 0,68% 30%,86% 52%);
    filter:drop-shadow(0 0 7px #ff8c3a);animation:flick .1s infinite alternate;transition:height .12s,width .12s;}
  @keyframes flick{from{transform:scaleY(1) scaleX(1);opacity:.9}to{transform:scaleY(.78) scaleX(1.12);opacity:1}}
  .flame.big{width:34px;height:78px;filter:drop-shadow(0 0 16px #ff8c3a);animation:flickbig .07s infinite alternate;}
  @keyframes flickbig{from{transform:scaleY(1) scaleX(1);opacity:.95}to{transform:scaleY(.85) scaleX(1.2);opacity:1}}

  .num{font-size:130px;font-weight:800;line-height:1;color:#ffb347;}
  .hidden{display:none;}
  .label{font-size:13px;color:#8aa0bd;margin-bottom:8px;letter-spacing:.06em;text-transform:uppercase;}
  .task{font-size:21px;font-weight:600;color:#e8eef7;margin-bottom:26px;word-wrap:break-word;}
  .timer{font-size:92px;font-weight:800;color:#e8eef7;font-variant-numeric:tabular-nums;line-height:1;}
  .done-emoji{font-size:60px;margin-bottom:14px;}
  .done-title{font-size:26px;font-weight:800;color:#7CFC8A;margin-bottom:10px;}
  .reward{font-size:18px;font-weight:700;color:#ffb347;margin-bottom:14px;line-height:1.45;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div id="scene">
  <canvas id="cv"></canvas>
  <div id="flash"></div>
  <div id="pad"></div>
  <div id="rocketWrap">
    <div id="rocket">
      <svg width="64" height="92" viewBox="0 0 64 92">
        <defs>
          <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#aeb9cc"/><stop offset="0.45" stop-color="#ffffff"/><stop offset="1" stop-color="#8090a8"/>
          </linearGradient>
        </defs>
        <path d="M20 30 Q32 -2 44 30 Z" fill="#ff6a3d"/>
        <rect x="20" y="28" width="24" height="44" rx="11" fill="url(#body)"/>
        <circle cx="32" cy="42" r="6.5" fill="#7fd4ff" stroke="#2a3550" stroke-width="2"/>
        <polygon points="20,58 8,80 20,72" fill="#ff6a3d"/>
        <polygon points="44,58 56,80 44,72" fill="#ff6a3d"/>
        <rect x="25" y="70" width="14" height="6" rx="2" fill="#5a6b85"/>
      </svg>
      <div class="flame" id="flame"></div>
    </div>
  </div>
  <div id="countOverlay"></div>
  <div id="goText">GO</div>
</div>

<div id="app">
  <div id="setup">
    <h1>Two-Minute Launch</h1>
    <input id="task" type="text" placeholder="The one thing you're avoiding…" autocomplete="off">
    <button onclick="launch()">LAUNCH</button>
    <div class="hint">Type it. Hit launch. When the rocket goes, you go — just two minutes.</div>
  </div>

  <div id="work" class="hidden">
    <div class="label">Go — two minutes on</div>
    <div id="workTask" class="task"></div>
    <div id="timer" class="timer">2:00</div>
    <div class="hint">You don't have to finish. You have to start.</div>
  </div>

  <div id="done" class="hidden">
    <div class="done-emoji">✅</div>
    <div class="done-title">You started.</div>
    <div id="reward" class="reward"></div>
    <div class="hint">That was the whole win. Ride the momentum, or launch the next one.</div>
    <button onclick="reset()" style="margin-top:22px;">LAUNCH AGAIN</button>
  </div>
</div>

<script>
  // background stars
  const starsEl=document.getElementById('stars');
  for(let i=0;i<70;i++){
    const s=document.createElement('div');s.className='star';
    s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
    s.style.opacity=(Math.random()*0.7+0.2).toFixed(2);
    const sz=(Math.random()*2+1).toFixed(1);s.style.width=sz+'px';s.style.height=sz+'px';
    starsEl.appendChild(s);
  }

  const $=id=>document.getElementById(id);
  const cv=$('cv'),ctx=cv.getContext('2d');
  let W,H,dpr,particles=[],raf=null,phase='off',flyStart=0,taskText='',timerIv=null,audioCtx;
  const FLY_MS=1400;

  // === Screen-time reward ===
  // URL of your Cloudflare Worker that runs `INCRBY screentime_balance 5` and
  // returns { "balance": <new total> }. The Upstash token lives ONLY in the
  // Worker secret — NEVER in this file (the repo is public). Leave '' until the
  // Worker is deployed; then paste its https://...workers.dev URL here.
  const REWARD_ENDPOINT='https://winter-bread-eb31.xiayan0118.workers.dev';
  const REWARD_AMOUNT=5;

  function fit(){dpr=Math.min(window.devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);}
  fit();addEventListener('resize',fit);

  function tone(freq,dur,type,vol){
    try{
      audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type=type||'sine';o.frequency.value=freq;o.connect(g);g.connect(audioCtx.destination);
      g.gain.setValueAtTime(vol||0.05,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
      o.start();o.stop(audioCtx.currentTime+dur);
    }catch(e){}
  }
  function rumble(){
    try{
      audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sawtooth';o.frequency.setValueAtTime(60,audioCtx.currentTime);
      o.frequency.exponentialRampToValueAtTime(28,audioCtx.currentTime+1.2);
      o.connect(g);g.connect(audioCtx.destination);
      g.gain.setValueAtTime(0.0001,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.12,audioCtx.currentTime+0.1);
      g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+1.4);
      o.start();o.stop(audioCtx.currentTime+1.5);
    }catch(e){}
  }

  function nozzle(){const r=$('rocket').getBoundingClientRect();return {x:r.left+r.width/2,y:r.bottom-2};}
  function smoke(x,y,n){for(let i=0;i<n;i++){const a=Math.PI/2+(Math.random()-0.5)*1.5,sp=Math.random()*2+0.6;particles.push({t:'s',x:x+(Math.random()-0.5)*16,y:y,vx:Math.cos(a)*sp*0.7,vy:Math.abs(Math.sin(a))*sp+0.8,r:Math.random()*9+7,gr:0.5+Math.random()*0.7,l:0,m:48+Math.random()*40,g:Math.floor(Math.random()*40+150)});}}
  function spark(x,y,n){for(let i=0;i<n;i++){const a=Math.PI/2+(Math.random()-0.5)*1.3,sp=Math.random()*5.5+3;particles.push({t:'k',x:x,y:y,vx:Math.cos(a)*sp,vy:Math.abs(Math.sin(a))*sp+2,r:Math.random()*1.8+1,l:0,m:16+Math.random()*14});}}
  function streak(){if(Math.random()<0.7)particles.push({t:'l',x:Math.random()*W,y:-30,vy:20+Math.random()*18,len:30+Math.random()*50,l:0,m:80});}

  function show(id){['setup','work','done'].forEach(s=>$(s).classList.add('hidden'));if(id)$(id).classList.remove('hidden');}

  function launch(){
    taskText=$('task').value.trim()||'it';
    $('app').style.display='none';
    $('scene').style.display='block';
    show(null);
    particles=[];
    phase='count';
    if(!raf)raf=requestAnimationFrame(loop);
    let n=5;$('countOverlay').textContent=n;tone(440,0.12);
    const iv=setInterval(()=>{
      n--;
      if(n>0){$('countOverlay').textContent=n;tone(440,0.12);}
      else{clearInterval(iv);ignite();}
    },1000);
  }

  function ignite(){
    phase='ignite';
    $('countOverlay').style.display='none';
    $('goText').style.display='block';
    $('flame').classList.add('big');
    $('rocket').classList.add('shake');
    $('flash').style.opacity='1';
    rumble();
    setTimeout(()=>{$('flash').style.opacity='0';},250);
    setTimeout(()=>{
      $('rocket').classList.remove('shake');
      $('goText').style.display='none';
      phase='fly';flyStart=performance.now();
    },650);
  }

  function loop(ts){
    ctx.clearRect(0,0,W,H);
    if(phase==='count'){const n=nozzle();smoke(n.x,n.y,1);}
    else if(phase==='ignite'){const n=nozzle();smoke(n.x,n.y,7);spark(n.x,n.y,3);}
    else if(phase==='fly'){
      const t=ts-flyStart,p=Math.min(t/FLY_MS,1),ease=p*p;
      $('rocketWrap').style.transform='translateY('+(-(ease*(H+300)))+'px)';
      const n=nozzle();smoke(n.x,n.y,5);spark(n.x,n.y,2);streak();
      if(p>=1){phase='off';setTimeout(startWork,120);}
    }
    for(let i=particles.length-1;i>=0;i--){
      const o=particles[i];o.l++;
      if(o.t==='s'){
        o.x+=o.vx;o.y+=o.vy;o.vy*=0.95;o.vx*=0.97;o.r+=o.gr;
        const a=Math.max(0,1-o.l/o.m)*0.55;
        const grad=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
        grad.addColorStop(0,'rgba('+(o.g+30)+','+(o.g+20)+','+o.g+','+a+')');
        grad.addColorStop(1,'rgba('+o.g+','+o.g+','+o.g+',0)');
        ctx.fillStyle=grad;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,7);ctx.fill();
      }else if(o.t==='k'){
        o.vy+=0.22;o.x+=o.vx;o.y+=o.vy;
        const a=Math.max(0,1-o.l/o.m);
        ctx.fillStyle='rgba(255,'+Math.floor(180+70*a)+',120,'+a+')';
        ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,7);ctx.fill();
      }else{
        o.y+=o.vy;
        const a=Math.max(0,1-o.l/o.m)*0.5;
        ctx.strokeStyle='rgba(180,210,255,'+a+')';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(o.x,o.y);ctx.lineTo(o.x,o.y-o.len);ctx.stroke();
      }
      if(o.l>=o.m||o.y>H+60)particles.splice(i,1);
    }
    raf=requestAnimationFrame(loop);
  }

  function startWork(){
    if(raf){cancelAnimationFrame(raf);raf=null;}
    ctx.clearRect(0,0,W,H);
    $('scene').style.display='none';
    $('app').style.display='block';
    show('work');
    $('workTask').textContent=taskText;
    let left=120;$('timer').textContent='2:00';
    timerIv=setInterval(()=>{
      left--;
      const m=Math.floor(left/60),s=String(Math.max(left,0)%60).padStart(2,'0');
      $('timer').textContent=m+':'+s;
      if(left<=0){clearInterval(timerIv);tone(660,0.5,'sine',0.06);show('done');grantReward();}
    },1000);
  }

  async function grantReward(){
    const el=$('reward');
    if(!REWARD_ENDPOINT){el.textContent='';return;}            // Worker not wired up yet
    el.textContent='Banking +'+REWARD_AMOUNT+' min…';
    try{
      const res=await fetch(REWARD_ENDPOINT,{method:'POST'});
      if(!res.ok)throw 0;
      const data=await res.json();                             // { balance: <new total> }
      const after=Number(data.balance),before=after-REWARD_AMOUNT;
      el.innerHTML='🎉 +'+REWARD_AMOUNT+' min screen time<br><b>'+before+' → '+after+'</b> min banked';
    }catch(e){
      el.textContent='+'+REWARD_AMOUNT+' min earned — couldn’t reach the counter (offline?)';
    }
  }

  function reset(){
    if(timerIv)clearInterval(timerIv);
    $('rocketWrap').style.transform='';
    $('countOverlay').style.display='';
    $('flame').classList.remove('big');
    $('task').value='';
    $('reward').textContent='';
    show('setup');
  }
</script>
<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
</script>
</body>
</html>
